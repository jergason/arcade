<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID MARINE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace;}
  #game-container{position:relative;border:3px solid #1a3a1a;box-shadow:0 0 20px rgba(0,255,0,0.1),inset 0 0 20px rgba(0,0,0,0.5);}
  #controls-hint{color:#2a5a2a;font-size:10px;margin-top:12px;letter-spacing:2px;text-align:center;line-height:1.8;}
  #touch-controls{display:none;position:fixed;bottom:0;left:0;right:0;height:160px;z-index:1000;pointer-events:none;}
  .touch-btn{position:absolute;pointer-events:auto;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;color:rgba(255,255,255,0.4);font-size:18px;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .touch-btn:active,.touch-btn.active{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.4);}
  #btn-left{width:72px;height:72px;left:20px;bottom:44px;}
  #btn-right{width:72px;height:72px;left:108px;bottom:44px;}
  #btn-jump{width:80px;height:80px;right:100px;bottom:40px;}
  #btn-shoot{width:80px;height:80px;right:10px;bottom:40px;}
  @media(pointer:coarse),(hover:none){#touch-controls{display:block;}#controls-hint{display:none;}}
</style>
</head>
<body>
<div id="game-container"></div>
<div id="controls-hint">ARROWS / WASD — MOVE &amp; JUMP &nbsp;|&nbsp; SPACE — SHOOT &nbsp;|&nbsp; R — RESTART &nbsp;|&nbsp; B — DEBUG SKIP</div>
<div id="touch-controls">
  <div id="btn-left" class="touch-btn">◀</div>
  <div id="btn-right" class="touch-btn">▶</div>
  <div id="btn-jump" class="touch-btn">▲</div>
  <div id="btn-shoot" class="touch-btn">●</div>
</div>
<script type="module" src="/src/void-marine/main.ts"></script>
</body>
</html>

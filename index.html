<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 3rem;
      color: #888;
    }
    .games {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.card {
      display: block;
      width: 280px;
      padding: 2rem;
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    a.card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 0.6rem;
      color: #fff;
    }
    .card p {
      font-size: 0.85rem;
      line-height: 1.5;
      color: #888;
    }
    .tag {
      display: inline-block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.2em 0.6em;
      border-radius: 3px;
      margin-bottom: 0.8rem;
    }
    .tag.stealth { background: #1a2a1a; color: #6a6; }
    .tag.action { background: #2a1a1a; color: #a66; }
    .github-corner svg { fill: #e0e0e0; color: #0a0a0a; position: absolute; top: 0; right: 0; border: 0; }
    .github-corner:hover .octo-arm { animation: octocat-wave 560ms ease-in-out; }
    @keyframes octocat-wave { 0%,100% { transform: rotate(0); } 20%,60% { transform: rotate(-25deg); } 40%,80% { transform: rotate(10deg); } }
  </style>
</head>
<body>
  <a href="https://github.com/jergason/arcade" class="github-corner" aria-label="View source on GitHub"><svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path><path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px;" class="octo-arm"></path><path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor"></path></svg></a>
  <h1>Arcade</h1>
  <div class="games">
    <a class="card" href="./camera-sneak/">
      <span class="tag stealth">stealth</span>
      <h2>Camera Sneak</h2>
      <p>Dodge sweeping security cameras to reach the exit. Metal Gear Solid vibes in the browser.</p>
    </a>
    <a class="card" href="./void-marine/">
      <span class="tag action">action</span>
      <h2>Void Marine</h2>
      <p>Side-scrolling run-and-gun through alien-infested void stations. Three worlds, big bosses.</p>
    </a>
  </div>
</body>
</html>
